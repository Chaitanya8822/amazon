{% extends 'base.html' %}

{% block content %}
<div class="container text-center py-5">
    <div class="py-5">
        <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
        <h1 class="display-4 fw-bold mt-3">404</h1>
        <h3 class="fw-bold">Page Not Found</h3>
        <p class="text-muted lead">Sorry, the page you're looking for doesn't exist.</p>
        <div class="mt-4 d-flex gap-3 justify-content-center">
            <a href="{% url 'home' %}" class="btn btn-warning btn-lg fw-bold">
                <i class="bi bi-house me-2"></i>Go Home
            </a>
            <a href="{% url 'products:product_list' %}" class="btn btn-outline-secondary btn-lg">
                <i class="bi bi-grid me-2"></i>Browse Products
            </a>
        </div>
    </div>
</div>
{% endblock %}
